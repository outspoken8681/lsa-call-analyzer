<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ client.name }} — Call Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Arvo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .tt-brand {
      color: #fff;
      display: flex;
      align-items: center;
      margin-bottom: 1.75rem;
      text-decoration: none;
    }
    .login-card { width: 100%; max-width: 380px; }
    .card {
      border-radius: 12px !important;
      border: none !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.25) !important;
    }
    h5 { font-family: 'Rockwell', 'Arvo', Georgia, serif; }
    .btn-primary {
      background-color: #1e3a5f !important;
      border-color: #1e3a5f !important;
    }
    .btn-primary:hover { background-color: #162d4a !important; border-color: #162d4a !important; }
    .form-control:focus {
      border-color: #1e3a5f;
      box-shadow: 0 0 0 .2rem rgba(30,58,95,.2);
    }
  </style>
</head>
<body>
  <a class="tt-brand" href="#">
    <img src="/static/logo-white.png" alt="Triple Take" height="32" style="display:block">
    <span style="display:block;width:1px;height:32px;background:rgba(255,255,255,0.25);margin:0 .75rem;flex-shrink:0"></span>
    <span style="font-family:'Rockwell','Arvo',Georgia,serif;font-size:1.1rem;font-weight:400;color:#fff;letter-spacing:0.01em;line-height:1;align-self:center;margin-top:8px">Google LSA Analyzer</span>
  </a>

  <div class="login-card">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1">{{ client.name }}</h5>
        <p class="text-muted small mb-4">Enter your password to view call reports.</p>
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <form method="post" action="/portal/{{ client.slug }}/login">
          <div class="mb-3">
            <label class="form-label small fw-medium">Password</label>
            <input type="password" name="password" class="form-control" autofocus required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-medium">
            View Reports <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>

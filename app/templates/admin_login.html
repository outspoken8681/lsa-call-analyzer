<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Triple Take</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Arvo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .tt-brand {
      color: #fff;
      font-family: 'Rockwell', 'Arvo', Georgia, serif;
      font-size: 1.3rem;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1.75rem;
      text-decoration: none;
    }
    .login-card { width: 100%; max-width: 380px; }
    .card {
      border-radius: 12px !important;
      border: none !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.25) !important;
    }
    h5 { font-family: 'Rockwell', 'Arvo', Georgia, serif; }
    .btn-primary {
      background-color: #1e3a5f !important;
      border-color: #1e3a5f !important;
    }
    .btn-primary:hover { background-color: #162d4a !important; border-color: #162d4a !important; }
    .form-control:focus {
      border-color: #1e3a5f;
      box-shadow: 0 0 0 .2rem rgba(30,58,95,.2);
    }
  </style>
</head>
<body>
  <a class="tt-brand" href="#">
    <svg width="26" height="19" viewBox="0 0 26 19" fill="white" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="5.5" width="3" height="8" rx="1"/>
      <rect x="0" y="1" width="7.5" height="3" rx="1"/>
      <rect x="0" y="15" width="7.5" height="3" rx="1"/>
      <rect x="23" y="5.5" width="3" height="8" rx="1"/>
      <rect x="18.5" y="1" width="7.5" height="3" rx="1"/>
      <rect x="18.5" y="15" width="7.5" height="3" rx="1"/>
      <circle cx="13" cy="9.5" r="2.8"/>
    </svg>
    triple take
  </a>

  <div class="login-card">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1">Admin Sign In</h5>
        <p class="text-muted small mb-4">LSA Lead Analyzer</p>
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
          <div class="mb-3">
            <label class="form-label small fw-medium">Password</label>
            <input type="password" name="password" class="form-control" autofocus required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-medium">
            Sign In <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
